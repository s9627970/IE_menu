<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點菜名單</title>
    <style>
        /* 重置基本樣式 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* 避免選取框操作時選中文字 */
        }

        /* 黑板主區域 */
        #blackboard {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: #2c4a34; 
            background-image: url('YOUR_BACKGROUND_IMAGE_URL.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* 頂部控制面板 */
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="number"] {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 160px;
        }

        button {
            padding: 8px 15px;
            font-size: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }

        button:hover { background-color: #45a049; }
        #export-btn { background-color: #2196F3; }
        #export-btn:hover { background-color: #0b7dda; }
        #import-btn { background-color: #ff9800; }
        #import-btn:hover { background-color: #e68a00; }

        /* 所有可拖曳的共通樣式 */
        .draggable-item {
            position: absolute;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .draggable-item:active { cursor: grabbing; }

        /* 點菜圖片的樣式 */
        .board-item {
            width: 100px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border-radius: 8px;
            z-index: 10;
        }

        /* 可縮放字體圖片的專屬樣式 */
        .resizable-item {
            /* 移除這裡原本的 resize: both; */
            overflow: hidden;
            z-index: 5;
            border: 2px dashed transparent;
        }

        /* 新增這一段：當被選取時才開啟右下角縮放功能 */
        .resizable-item.selected {
            resize: both; 
        }

        .resizable-item:hover { border-color: rgba(255, 255, 255, 0.5); }
        
        .resizable-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* 讓滑鼠事件穿透到外層容器，確保拖曳正常運作 */
        }

        /* 選取狀態與選取框 */
        .selected {
            outline: 4px solid #ffeb3b; /* 選中時的黃色高光 */
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.8);
        }

        .selection-box {
            position: absolute;
            border: 1px solid #2196F3;
            background-color: rgba(33, 150, 243, 0.2);
            z-index: 999;
            pointer-events: none;
            display: none;
        }

        /* 右下角垃圾桶 */
        #trash-can {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 3px dashed #ff4c4c;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff4c4c;
            font-size: 32px;
            z-index: 90;
            transition: all 0.3s;
        }

        #trash-can.hovered {
            background-color: rgba(255, 76, 76, 0.3);
            transform: scale(1.1);
        }

        /* 抽獎轉盤按鈕 */
        #wheel-icon {
            position: absolute;
            bottom: 30px;
            right: 130px; /* 放在垃圾桶(30px + 寬度80px + 間距20px)的左邊 */
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 3px dashed #ffeb3b;
            border-radius: 50%; /* 圓形 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            z-index: 90;
            transition: all 0.3s;
        }

        #wheel-icon:hover {
            background-color: rgba(255, 235, 59, 0.3);
            transform: scale(1.1) rotate(15deg);
        }

        /* 轉盤彈出視窗 (預設隱藏) */
        #wheel-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .close-btn:hover { color: #333; }

        /* 轉盤顯示區 */
        #wheel-spinner {
            width: 150px; height: 150px;
            margin: 20px auto;
            border-radius: 50%;
            border: 5px solid #ff9800;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #333;
            background: #fff3e0;
            overflow: hidden;
        }

        /* 抽獎動畫特效 */
        .spinning {
            animation: spinFlash 0.1s infinite;
        }

        @keyframes spinFlash {
            0% { background: #fff3e0; }
            50% { background: #ffe0b2; }
            100% { background: #fff3e0; }
        }

        #start-draw-btn {
            width: 100%;
            font-size: 18px;
            padding: 10px;
            background-color: #f44336;
        }
        #start-draw-btn:hover { background-color: #d32f2f; }
        #start-draw-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="blackboard">
        <div id="control-panel">
            <div class="control-row">
                <input type="number" id="icon-id" placeholder="輸入數字 (例如 2254)">
                <button id="add-btn">新增</button>
                <button id="export-btn">匯出</button>
                <button id="import-btn">匯入</button>
                <input type="file" id="file-input" accept=".txt" style="display: none;">
            </div>
        </div>

        <div id="font1" class="resizable-item draggable-item" style="top: 100px; left: 20px; width: 350px; height: 60px;">
            <img src="font1.png" alt="Font 1">
        </div>
        <div id="font2" class="resizable-item draggable-item" style="top: 180px; left: 20px; width: 350px; height: 60px;">
            <img src="font2.png" alt="Font 2">
        </div>

        <div id="trash-can">🗑️</div>
        <div id="wheel-icon" title="隨機抽菜">🎡</div>

        <div id="wheel-modal">
            <div class="modal-content">
                <span class="close-btn" id="close-modal">&times;</span>
                <h2>今晚吃什麼？</h2>
                <div id="wheel-spinner">
                    <span id="spinner-text">❓</span>
                    <img id="spinner-img" src="" alt="抽獎中" style="display: none; width: 100%; height: 100%; object-fit: contain; border-radius: 50%;">
                </div>
                <button id="start-draw-btn">開始抽獎</button>
                <div id="draw-result" style="margin-top: 15px; font-weight: bold; color: #f44336; min-height: 24px;"></div>
            </div>
        </div>
    </div>

    <script>
        const blackboard = document.getElementById('blackboard');
        const addBtn = document.getElementById('add-btn');
        const inputField = document.getElementById('icon-id');
        const trashCan = document.getElementById('trash-can');
        const exportBtn = document.getElementById('export-btn');
        const importBtn = document.getElementById('import-btn');
        const fileInput = document.getElementById('file-input');

        // 初始化滑鼠框選框
        const selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        blackboard.appendChild(selectionBox);

        // --- 圖片生成函數 ---
        function createBoardImage(rawId, posX, posY) {
            let imgUrl = "";
            let finalId = "";

            if (parseInt(rawId) >= 20001) {
                finalId = rawId.toString();
                imgUrl = `https://tinghan33704.github.io/tos-tools/src/img/monster/${finalId}.png`;
            } else {
                finalId = rawId.toString().padStart(4, '0');
                imgUrl = `https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${finalId}.jpg`;
            }

            const img = new Image();
            img.src = imgUrl;
            img.className = 'board-item draggable-item'; // 加入共用的 draggable-item 類別
            img.dataset.iconId = finalId; 
            
            img.style.left = `${posX}px`;
            img.style.top = `${posY}px`;

            img.onload = () => blackboard.appendChild(img);
            img.onerror = () => {
                alert(`讀取失敗！\n編號：${finalId}`);
                img.remove();
            };
        }

        // --- UI 按鈕事件 ---
        addBtn.addEventListener('click', () => {
            let rawInput = inputField.value.trim();
            if (!rawInput) return alert('請先輸入數字！');
            const randomTop = Math.floor(Math.random() * (window.innerHeight - 200)) + 50;
            const randomLeft = 450; 
            createBoardImage(rawInput, randomLeft, randomTop);
            inputField.value = ''; 
        });

        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBtn.click(); });

        exportBtn.addEventListener('click', () => {
            const items = document.querySelectorAll('.board-item');
            if (items.length === 0) return alert('黑板上沒有圖片可以匯出喔！');
            const ids = Array.from(items).map(img => img.dataset.iconId);
            const blob = new Blob([ids.join(',')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'menu.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        // 匯入與動態排列邏輯
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const ids = event.target.result.split(',').map(id => id.trim()).filter(id => id !== '');
                if (ids.length === 0) return;

                // 抓取 font2 目前的位置
                const font2 = document.getElementById('font2');
                const startX = font2.offsetLeft; // 與 font2 齊平
                const startY = font2.offsetTop + font2.offsetHeight + 10; // 在 font2 正下方 10px 處
                
                const spacingX = 110; 
                const spacingY = 110; 
                const maxRight = window.innerWidth - 110; // 視窗右側邊界防溢出

                let currentX = startX;
                let currentY = startY;

                ids.forEach(id => {
                    // 如果超出視窗寬度，自動換行
                    if (currentX > maxRight && currentX !== startX) {
                        currentX = startX;
                        currentY += spacingY;
                    }
                    createBoardImage(id, currentX, currentY);
                    currentX += spacingX;
                });
            };
            reader.readAsText(file);
            fileInput.value = ''; 
        });

        // --- 全域拖曳與多選系統 ---
        let isDragging = false;
        let isSelecting = false;
        let dragStartX, dragStartY, selStartX, selStartY;
        let draggedItems = [];

        document.addEventListener('mousedown', (e) => {
            const item = e.target.closest('.draggable-item');
            
            // 情況 1：點擊到可拖曳的圖片
            if (item) {
                // 如果點擊的是字體圖片的「右下角縮放區域」，則放行讓瀏覽器處理縮放
                if (item.classList.contains('resizable-item')) {
                    if (e.offsetX >= item.offsetWidth - 20 && e.offsetY >= item.offsetHeight - 20) {
                        return; 
                    }
                }
                
                e.preventDefault(); // 阻擋原生的圖片拖曳虛影

                // 如果點擊的圖片還沒被選取，就清除其他選取，單獨選中它
                if (!item.classList.contains('selected')) {
                    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
                    item.classList.add('selected');
                }

                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;

                // 記錄所有被選中圖片的初始位置
                draggedItems = Array.from(document.querySelectorAll('.selected')).map(el => {
                    el.style.zIndex = 1000; // 拖曳時移至最上層
                    return { element: el, initialLeft: el.offsetLeft, initialTop: el.offsetTop };
                });
            } 
            // 情況 2：點擊到黑板空白處，開始畫框多選
            else if (e.target.id === 'blackboard') {
                isSelecting = true;
                selStartX = e.clientX;
                selStartY = e.clientY;
                selectionBox.style.left = selStartX + 'px';
                selectionBox.style.top = selStartY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                selectionBox.style.display = 'block';

                // 清除之前的選取
                document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            }
        });

        document.addEventListener('mousemove', (e) => {
            // 處理拖曳群組
            if (isDragging) {
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;

                draggedItems.forEach(drag => {
                    drag.element.style.left = `${drag.initialLeft + dx}px`;
                    drag.element.style.top = `${drag.initialTop + dy}px`;
                });

                // 垃圾桶高亮判定 (只要滑鼠位置進入垃圾桶)
                trashCan.classList.toggle('hovered', isOverTrash(e.clientX, e.clientY));
            } 
            // 處理畫選取框
            else if (isSelecting) {
                const currentX = e.clientX;
                const currentY = e.clientY;
                const left = Math.min(selStartX, currentX);
                const top = Math.min(selStartY, currentY);
                const width = Math.abs(currentX - selStartX);
                const height = Math.abs(currentY - selStartY);

                selectionBox.style.left = left + 'px';
                selectionBox.style.top = top + 'px';
                selectionBox.style.width = width + 'px';
                selectionBox.style.height = height + 'px';

                // 計算交集：找出被選取框覆蓋的圖片
                const rect1 = selectionBox.getBoundingClientRect();
                document.querySelectorAll('.draggable-item').forEach(item => {
                    const rect2 = item.getBoundingClientRect();
                    const overlap = !(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom);
                    
                    if (overlap) item.classList.add('selected');
                    else item.classList.remove('selected');
                });
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (isDragging) {
                isDragging = false;
                const overTrash = isOverTrash(e.clientX, e.clientY);
                trashCan.classList.remove('hovered');

                draggedItems.forEach(drag => {
                    // 恢復正確的 z-index 層級 (菜單圖片10，字體圖片5)
                    drag.element.style.zIndex = drag.element.classList.contains('board-item') ? 10 : 5;
                    
                    // 如果在垃圾桶上方放開，且該物件是「菜單圖片」則刪除 (保護字體圖片不被誤刪)
                    if (overTrash && drag.element.classList.contains('board-item')) {
                        drag.element.remove();
                    }
                });
                draggedItems = [];
            }

            if (isSelecting) {
                isSelecting = false;
                selectionBox.style.display = 'none';
            }
        });

        // 判斷是否在垃圾桶上方
        function isOverTrash(mouseX, mouseY) {
            const rect = trashCan.getBoundingClientRect();
            return (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom);
        }

        // --- 抽獎轉盤系統 ---
        const wheelIcon = document.getElementById('wheel-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const closeModal = document.getElementById('close-modal');
        const startDrawBtn = document.getElementById('start-draw-btn');
        const wheelSpinner = document.getElementById('wheel-spinner');
        const drawResult = document.getElementById('draw-result');

        // 新增：抓取轉盤內的文字與圖片元素
        const spinnerText = document.getElementById('spinner-text');
        const spinnerImg = document.getElementById('spinner-img');

        // 開啟/關閉視窗
        wheelIcon.addEventListener('click', () => {
            wheelModal.style.display = 'flex';
            // 每次打開時重置為問號
            spinnerText.style.display = 'block';
            spinnerImg.style.display = 'none';
            drawResult.innerText = '';
        });

        closeModal.addEventListener('click', () => {
            wheelModal.style.display = 'none';
        });

        // 點擊開始抽獎
        startDrawBtn.addEventListener('click', () => {
            const items = document.querySelectorAll('.board-item');
            if (items.length === 0) {
                alert('黑板上沒有菜色可以抽喔！請先新增或匯入。');
                return;
            }

            // 鎖定按鈕與狀態
            startDrawBtn.disabled = true;
            wheelSpinner.classList.add('spinning');
            drawResult.innerText = '轉動中...';
            
            // 切換顯示模式：隱藏問號，顯示圖片
            spinnerText.style.display = 'none';
            spinnerImg.style.display = 'block';
            
            let counter = 0;
            const spinDuration = 20; // 轉動次數

            // 模擬轉盤圖片快速閃爍
            const spinInterval = setInterval(() => {
                const randomTempItem = items[Math.floor(Math.random() * items.length)];
                spinnerImg.src = randomTempItem.src; // 快速替換圖片網址
                counter++;

                if (counter > spinDuration) {
                    clearInterval(spinInterval);
                    wheelSpinner.classList.remove('spinning');
                    
                    // 決定最終中獎者
                    const winnerIndex = Math.floor(Math.random() * items.length);
                    const winnerItem = items[winnerIndex];
                    
                    spinnerImg.src = winnerItem.src; // 轉盤定格在中獎圖片
                    drawResult.innerText = `恭喜抽出：${winnerItem.dataset.iconId}！`;

                    // --- 精準對齊 font1 的中心點 ---
                    const font1 = document.getElementById('font1');
                    
                    // X軸：放在 font1 右邊間隔 30px 處
                    const targetLeft = font1.offsetLeft + font1.offsetWidth + 30;
                    
                    // Y軸置中公式：font1 的中心點 Y 座標 - (中獎圖片高度的一半)
                    const font1CenterY = font1.offsetTop + (font1.offsetHeight / 2);
                    const winnerItemHeight = winnerItem.offsetHeight; 
                    const targetTop = font1CenterY - (winnerItemHeight / 2); 

                    // 執行飛行動畫
                    winnerItem.style.transition = 'left 0.8s ease-in-out, top 0.8s ease-in-out';
                    winnerItem.style.left = `${targetLeft}px`;
                    winnerItem.style.top = `${targetTop}px`;
                    winnerItem.style.zIndex = 1000;

                    // 取消其他選取，將中獎圖高光顯示
                    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
                    winnerItem.classList.add('selected');

                    // 動畫收尾
                    setTimeout(() => {
                        winnerItem.style.transition = 'transform 0.1s, box-shadow 0.1s';
                        startDrawBtn.disabled = false;
                        
                        // 延遲 1.5 秒後自動關閉抽獎視窗
                        setTimeout(() => {
                            wheelModal.style.display = 'none';
                        }, 1500);
                        
                    }, 800);
                }
            }, 50); // 每 50 毫秒跳動一次
        });

    </script>
</body>
</html>
